<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cabanyal-Go</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div id="ui-layer">
        
        <div class="header">
            <h1>Cabanyal-Go</h1>
            <div class="bypass-control">
                <label for="bypass-toggle">Bypass GPS</label>
                <label class="switch">
                    <input type="checkbox" id="bypass-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <div id="location-warning" class="warning-overlay hidden">
            <div class="warning-box">
                <h2>No estás en la ubicación</h2>
                <p>Acércate a las coordenadas para revelar el objeto.</p>
                <p id="distance-info">Calculando distancia...</p>
                
                <a id="maps-link" href="#" target="_blank" class="maps-btn hidden">📍 Ver en Google Maps</a>
            </div>
        </div>

        <div class="bottom-nav">
            <select id="mode-selector" class="mode-select">
                <option value="floating">🛸 Modo: Holograma Flotante</option>
                <option value="marker">⬛ Modo: Marcador Hiro</option>
                <option value="hud">🎯 Modo: Anclado a Cámara</option>
            </select>
        </div>

    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity camera></a-entity>
    </a-scene>

    <script src="main.js"></script>
</body>
</html>
