<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cabanyal-Go</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="stylesheet" href="main.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui-layer">
        <div class="header">
            <h1>Cabanyal-Go</h1>
            <div class="bypass-control">
                <label for="bypass-toggle">Bypass GPS</label>
                <label class="switch">
                    <input type="checkbox" id="bypass-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <div id="location-warning" class="warning-overlay">
            <div class="warning-box">
                <h2>No estás en la ubicación</h2>
                <p>Acércate a las coordenadas para revelar el objeto.</p>
                <p id="distance-info">Calculando distancia...</p>
            </div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-gltf-model 
            id="ar-model"
            src="key.glb" 
            position="0 -1 -3" 
            scale="1 1 1"
            visible="false">
        </a-gltf-model>
        
        <a-entity camera></a-entity>
    </a-scene>

    <script src="main.js"></script>
</body>
</html>
